name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Astro site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Create IndexNow key file
        run: echo "${{ secrets.INDEXNOW_KEY }}" > public/${{ secrets.INDEXNOW_KEY }}.txt

      - name: Build Astro site
        run: pnpm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify IndexNow about changed posts
        env:
          HOST: proutist.com
          KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          # Extract added and modified files from ALL commits in this push
          # (works correctly whether you push 1 commit or 50 at once)
          # Intentionally exclude removed files — search engines handle 404/410 on their own
          CHANGED_FILES=$(jq -r '
            [.commits[]? | (.added[]?, .modified[]?)] | unique[]
          ' "$GITHUB_EVENT_PATH" | grep -E '^src/data/blog/.*\.mdx?$' || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No blog post changes in this push. Skipping IndexNow."
            exit 0
          fi

          echo "Changed blog posts:"
          echo "$CHANGED_FILES"
          echo ""

          # Build JSON array of URLs
          URL_LIST="[]"
          for FILE in $CHANGED_FILES; do
            SLUG=$(basename "$FILE" | sed 's/\.[^.]*$//')
            URL="https://${HOST}/posts/${SLUG}/"
            URL_LIST=$(echo "$URL_LIST" | jq --arg url "$URL" '. + [$url]')
          done

          echo "Submitting to IndexNow:"
          echo "$URL_LIST" | jq .

          PAYLOAD=$(jq -n \
            --arg host "$HOST" \
            --arg key "$KEY" \
            --argjson urls "$URL_LIST" \
            '{host: $host, key: $key, keyLocation: "https://\($host)/\($key).txt", urlList: $urls}')

          # Submit to both Yandex and Bing IndexNow endpoints
          for ENDPOINT in "https://yandex.com/indexnow" "https://api.indexnow.org/indexnow"; do
            echo ""
            echo "→ POST $ENDPOINT"
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "$ENDPOINT" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d "$PAYLOAD")
            echo "  Response: $HTTP_CODE"
          done