name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Astro site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Create IndexNow key file
        run: echo "${{ secrets.INDEXNOW_KEY }}" > public/${{ secrets.INDEXNOW_KEY }}.txt

      - name: Build Astro site
        run: pnpm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Checkout repository for IndexNow
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Notify IndexNow about changed posts
        env:
          HOST: proutist.com
          KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          # Extract added and modified files
          # We use git diff for perfect accuracy, falling back to event payload for new branches
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ] || [ -z "${{ github.event.before }}" ]; then
            CHANGED_FILES=$(jq -r '[.commits[]? | (.added[]?, .modified[]?)] | unique[]' "$GITHUB_EVENT_PATH" | grep -E '^src/data/blog/.*\.mdx?$' || true)
            ADDED_FILES=$(jq -r '[.commits[]? | .added[]?] | unique[]' "$GITHUB_EVENT_PATH" | grep -E '^src/data/blog/.*\.mdx?$' || true)
          else
            CHANGED_FILES=$(git diff --name-only --diff-filter=AM ${{ github.event.before }} ${{ github.sha }} | grep -E '^src/data/blog/.*\.mdx?$' || true)
            ADDED_FILES=$(git diff --name-only --diff-filter=A ${{ github.event.before }} ${{ github.sha }} | grep -E '^src/data/blog/.*\.mdx?$' || true)
          fi

          if [ -z "$CHANGED_FILES" ]; then
            echo "No blog post changes in this push. Skipping IndexNow."
            exit 0
          fi

          echo "Changed blog posts:"
          echo "$CHANGED_FILES"
          echo ""

          # Build JSON array of post URLs
          URL_LIST="[]"
          for FILE in $CHANGED_FILES; do
            SLUG=$(basename "$FILE" | sed 's/\.[^.]*$//')
            URL="https://${HOST}/posts/${SLUG}/"
            URL_LIST=$(echo "$URL_LIST" | jq --arg url "$URL" '. + [$url]')
          done

          # llms-full.txt changes whenever any post is added or modified
          URL_LIST=$(echo "$URL_LIST" | jq --arg url "https://${HOST}/llms-full.txt" '. + [$url]')
          echo "→ Added llms-full.txt (content changed)"

          # llms.txt changes only when a new post is added (the list of posts grew)
          if [ -n "$ADDED_FILES" ]; then
            URL_LIST=$(echo "$URL_LIST" | jq --arg url "https://${HOST}/llms.txt" '. + [$url]')
            echo "→ Added llms.txt (new post detected)"
          fi

          echo ""
          echo "Submitting to IndexNow:"
          echo "$URL_LIST" | jq .

          PAYLOAD=$(jq -n \
            --arg host "$HOST" \
            --arg key "$KEY" \
            --argjson urls "$URL_LIST" \
            '{host: $host, key: $key, keyLocation: "https://\($host)/\($key).txt", urlList: $urls}')

          # Submit to both Yandex and Bing IndexNow endpoints
          for ENDPOINT in "https://yandex.com/indexnow" "https://api.indexnow.org/indexnow"; do
            echo ""
            echo "→ POST $ENDPOINT"
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "$ENDPOINT" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d "$PAYLOAD")
            echo "  Response: $HTTP_CODE"
          done